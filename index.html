<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cigar Haven</title>
  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background-color: #0d0d0d;
      color: #f5f5f5;
      text-align: center;
    }
    header {
      padding: 40px;
      font-size: 32px;
      letter-spacing: 2px;
    }
    .hero {
      margin-top: 100px;
    }
    .hero h1 {
      font-size: 48px;
    }
    .hero p {
      font-size: 18px;
      color: #bbb;
    }
    .button {
      margin-top: 30px;
      padding: 12px 25px;
      border: 1px solid #c9a55c;
      color: #c9a55c;
      text-decoration: none;
      display: inline-block;
    }
    .button:hover {
      background-color: #c9a55c;
      color: black;
    }
  </style>
</head>
<body>

<header>
  CIGAR HAVEN
</header>

<div class="hero">
  <h1>Find the Best Cigars at the Best Price</h1>
  <p>Search across top retailers instantly.</p>

  <input type="text" id="searchInput" placeholder="Search cigars (e.g. Cohiba, Padron)">
  <br><br>
  <button onclick="searchCigars()" class="button">Search</button>

  <div id="results" style="margin-top:40px;"></div>
</div>

<script>
async function searchCigars() {
  const query = document.getElementById("searchInput").value;
  const resultsDiv = document.getElementById("results");

  if (!query) {
    resultsDiv.innerHTML = "<p>Please enter a cigar name.</p>";
    return;
  }

  resultsDiv.innerHTML = "<p>Searching...</p>";

  try {
    const response = await fetch(`https://cigarhaven-backend.onrender.com/search?q=${encodeURIComponent(query)}`);
    const results = await response.json();

    if (!results.length) {
      resultsDiv.innerHTML = "<p>No results found.</p>";
      return;
    }

    resultsDiv.innerHTML = `
      <h2>Results for "${query}"</h2>
      ${results.map(item => `
        <div style="margin-bottom:20px; border:1px solid #444; padding:15px; border-radius:8px;">
          <h3>${item.store}</h3>
          <p>${item.name}</p>
          <p><strong>${item.price}</strong></p>
          <a href="${item.url}" target="_blank">View Product</a>
        </div>
      `).join("")}
    `;
  } catch (error) {
    resultsDiv.innerHTML = "<p>Error loading results.</p>";
    console.error(error);
  }
}
</script>
</body>
</html>
