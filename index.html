<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cigar Haven</title>
  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background-color: #0d0d0d;
      color: #f5f5f5;
      text-align: center;
    }
    header {
      padding: 40px;
      font-size: 32px;
      letter-spacing: 2px;
    }
    .hero {
      margin-top: 100px;
    }
    .hero h1 {
      font-size: 48px;
    }
    .hero p {
      font-size: 18px;
      color: #bbb;
    }
    .button {
      margin-top: 30px;
      padding: 12px 25px;
      border: 1px solid #c9a55c;
      color: #c9a55c;
      text-decoration: none;
      display: inline-block;
    }
    .button:hover {
      background-color: #c9a55c;
      color: black;
    }
  </style>
</head>
<body>

<header>
  CIGAR HAVEN
</header>

<div class="hero">
  <h1>Find the Best Cigars at the Best Price</h1>
  <p>Search across top retailers instantly.</p>

  <input type="text" id="searchInput" placeholder="Search cigars (e.g. Cohiba, Padron)">
  <br><br>
  <button onclick="searchCigars()" class="button">Search</button>

  <div id="results" style="margin-top:40px;"></div>
</div>

<script>
function searchCigars() {
  const query = document.getElementById("searchInput").value;
  const resultsDiv = document.getElementById("results");

  if (!query) {
    resultsDiv.innerHTML = "<p>Please enter a cigar name.</p>";
    return;
  }

  resultsDiv.innerHTML = `
    <h2>Results for "${query}"</h2>
    <p><a href="https://www.jrcigars.com/search?q=${query}" target="_blank">Check JR Cigars</a></p>
    <p><a href="https://www.cigarsinternational.com/search?query=${query}" target="_blank">Check Cigars International</a></p>
    <p><a href="https://www.thompsoncigar.com/search?text=${query}" target="_blank">Check Thompson Cigars</a></p>
  `;
}
</script>

</body>
</html>
