<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cigar Haven</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background-color: #0d0d0d;
      color: #f5f5f5;
      min-height: 100vh;
    }

    header {
      padding: 24px 40px;
      letter-spacing: 4px;
      font-size: 14px;
      color: #c9a55c;
      border-bottom: 1px solid #222;
      text-transform: uppercase;
    }

    .hero {
      text-align: center;
      padding: 80px 20px 40px;
    }

    .hero h1 {
      font-size: 42px;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .hero p {
      font-size: 16px;
      color: #888;
      margin-bottom: 40px;
    }

    .search-bar {
      display: flex;
      justify-content: center;
      max-width: 600px;
      margin: 0 auto;
    }

    .search-bar input {
      flex: 1;
      padding: 14px 20px;
      font-size: 15px;
      background: #1a1a1a;
      border: 1px solid #444;
      color: #f5f5f5;
    }

    .search-bar button {
      padding: 14px 28px;
      background: #c9a55c;
      color: #0d0d0d;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    #results {
      max-width: 900px;
      margin: 50px auto;
      padding: 0 20px 60px;
    }
  </style>
</head>
<body>

<header>Cigar Haven</header>

<div class="hero">
  <h1>Find the Best Cigars at the Best Price</h1>
  <p>Live prices pulled from top retailers — sorted lowest first.</p>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search by brand">
    <button onclick="searchCigars()">Search</button>
  </div>
</div>

<div id="results"></div>

<script>
const BACKEND = "https://cigarhaven-backend.onrender.com";

function searchCigars() {
  const query = document.getElementById("searchInput").value.trim();

  fetch(`${BACKEND}/search?q=${encodeURIComponent(query)}`)
    .then(r => r.json())
    .then(results => {
      document.getElementById("results").innerHTML =
        JSON.stringify(results, null, 2);
    });
}
</script>

</body>
</html>
